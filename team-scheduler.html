<script>
const CLR=[{bg:'#7c3aed',lt:'#ede9fe',tx:'#4c1d95'},{bg:'#0ea5e9',lt:'#e0f2fe',tx:'#0c4a6e'},{bg:'#f97316',lt:'#fff7ed',tx:'#7c2d12'},{bg:'#10b981',lt:'#d1fae5',tx:'#064e3b'},{bg:'#e11d48',lt:'#ffe4e6',tx:'#881337'}];
const NAMES=['광빈','찬호','기훈','석호','민석'];
const KWD={'월':1,'화':2,'수':3,'목':4,'금':5,'토':6,'일':0,'mon':1,'tue':2,'wed':3,'thu':4,'fri':5,'sat':6,'sun':0,'monday':1,'tuesday':2,'wednesday':3,'thursday':4,'friday':5,'saturday':6,'sunday':0};
const ENMO={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12,january:1,february:2,march:3,april:4,june:6,july:7,august:8,september:9,october:10,november:11,december:12};
const KD=['일','월','화','수','목','금','토'];
const now=new Date();

function ttColor(label){
  if(/공연(?!장)/.test(label))return{cls:'tt-perform',dot:'#ef4444',text:'#b91c1c'};
  if(/셋체인지|사운드|리허설/.test(label))return{cls:'tt-setchange',dot:'#3b82f6',text:'#1d4ed8'};
  if(/도착|이동|출발/.test(label))return{cls:'tt-arrive',dot:'#eab308',text:'#92400e'};
  return{cls:'tt-other',dot:'#f97316',text:'#c2410c'};
}

function pad(n){return String(n).padStart(2,'0');}
function toMin(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function normDate(d){if(!d)return'';const p=String(d).trim().split(/[-\/]/);if(p.length!==3)return d;return`${p[0]}-${pad(parseInt(p[1]))}-${pad(parseInt(p[2]))}`;}
function dateStr(date){return`${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;}
function hhmm(h,m=0){return`${pad(Math.min(23,h))}:${pad(m)}`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function slotsKey(s){return`${s.date}|${s.startTime}|${s.endTime}`;}
function isBz(slots,date,slotTime){const sm=toMin(slotTime);return slots.some(s=>normDate(s.date)===date&&toMin(s.startTime)<=sm&&sm<toMin(s.endTime));}
function ttEventAt(concert,sl){
  const sm=toMin(sl);
  return concert.timetable.find(e=>{const st=toMin(e.time),en=e.endTime?toMin(e.endTime):st+10;return st<=sm&&sm<en;})||null;
}

// 10-min slots 08:00–23:50
const SLOTS=[];
for(let h=8;h<24;h++)for(let m=0;m<60;m+=10)SLOTS.push(pad(h)+':'+pad(m));

// ── SCHEDULE PARSER ──
function detectAmpm(str){if(/오후|pm/i.test(str))return'pm';if(/오전|am/i.test(str))return'am';if(/저녁|evening/i.test(str))return'evening';if(/아침|morning/i.test(str))return'morning';return null;}
function parseKorHour(raw,ampm){let h=parseInt(raw)||0,m=0;if(/반/.test(raw))m=30;const mm=raw.match(/(\d+)분/);if(mm)m=parseInt(mm[1]);if(ampm==='pm'&&h<12)h+=12;if(ampm==='am'&&h===12)h=0;if(ampm==='evening'&&h<12)h+=12;return{h,m};}
function parseTime(str){
  str=str.trim();
  if(/종일|하루종일|all\s*day/i.test(str))return{start:'08:00',end:'24:00'};
  if(/저녁/.test(str)&&!/시/.test(str))return{start:'18:00',end:'21:00'};
  if(/아침/.test(str)&&!/시/.test(str))return{start:'09:00',end:'12:00'};
  if(/(오후\s*중|오후\s*내내)/.test(str)&&!/시/.test(str))return{start:'13:00',end:'17:00'};
  if(/(오전\s*중|오전\s*내내)/.test(str)&&!/시/.test(str))return{start:'09:00',end:'12:00'};
  const ampm=detectAmpm(str);
  const aK=str.match(/(\d+)\s*(?:시(?:반)?(?:\d+분)?)?\s*(?:이후|부터~?|~\s*$)/);
  const aE=str.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)?\s*(?:onwards|after|~\s*$)/i);
  if(aK){const s=parseKorHour(aK[1],ampm);return{start:hhmm(s.h,s.m),end:'24:00'};}
  if(aE){let h=parseInt(aE[1]),m=parseInt(aE[2]||0),ap=(aE[3]||'').toLowerCase();if(ap==='pm'&&h<12)h+=12;if(ap==='am'&&h===12)h=0;return{start:hhmm(h,m),end:'24:00'};}
  let m=str.match(/(\d+)(?:시(?:반)?(?:\d+분)?)?\s*[-~]\s*(\d+)(?:시)?/);
  if(m){const s=parseKorHour(m[1],ampm),e=parseKorHour(m[2],ampm);if(e.h<=s.h&&e.h<12&&ampm==='pm')e.h+=12;return{start:hhmm(s.h,s.m),end:hhmm(e.h,e.m)};}
  m=str.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)?\s*[-~]\s*(\d{1,2})(?::(\d{2}))?\s*(am|pm)?/i);
  if(m){let sh=parseInt(m[1]),sm2=parseInt(m[2]||0),sap=(m[3]||'').toLowerCase(),eh=parseInt(m[4]),em2=parseInt(m[5]||0),eap=(m[6]||'').toLowerCase();if(sap==='pm'&&sh<12)sh+=12;if(sap==='am'&&sh===12)sh=0;if(eap==='pm'&&eh<12)eh+=12;if(eap==='am'&&eh===12)eh=0;if(!eap&&!sap&&eh<sh)eh+=12;return{start:hhmm(sh,sm2),end:hhmm(eh,em2)};}
  m=str.match(/(\d{1,2})(?:시|:00|:30)?/);
  if(m){const s=parseKorHour(m[1],ampm);return{start:hhmm(s.h,s.m),end:hhmm(s.h+1,s.m)};}
  return null;
}
function datesForWeekday(wdIdx,yr,mo){const dim=new Date(yr,mo+1,0).getDate(),dates=[];for(let d=1;d<=dim;d++)if(new Date(yr,mo,d).getDay()===wdIdx)dates.push(d);return dates;}
function parseSchedule(text,yr,mo){
  const slots=[],dim=new Date(yr,mo+1,0).getDate();
  const lines=text.split(/\n|,(?=\s*(?:\d|오|매|every|mon|tue|wed|thu|fri|sat|sun))/i).map(l=>l.trim()).filter(Boolean);
  const ds=(d)=>`${yr}-${pad(mo+1)}-${pad(d)}`;
  for(const line of lines){
    const lo=line.toLowerCase(),t=parseTime(line);
    const rK=line.match(/매\s*주?\s*([월화수목금토일](?:\s*[,·\/]\s*[월화수목금토일])*)/);
    if(rK){const days=rK[1].match(/[월화수목금토일]/g)||[];for(const d of days){const wi=KWD[d];if(wi===undefined)continue;for(const day of datesForWeekday(wi,yr,mo)){const tt=t||{start:'09:00',end:'18:00'};slots.push({date:ds(day),startTime:tt.start,endTime:tt.end});}}continue;}
    const rE=lo.match(/every\s+((?:(?:mon|tue|wed|thu|fri|sat|sun)(?:day)?(?:\s*[,&\/]\s*)?)+)/i);
    if(rE){const dt=(rE[1].match(/\b(?:mon|tue|wed|thu|fri|sat|sun)(?:day)?\b/gi)||[]);for(const tok of dt){const wi=KWD[tok.toLowerCase().slice(0,3)];if(wi===undefined)continue;for(const day of datesForWeekday(wi,yr,mo)){const tt=t||{start:'09:00',end:'18:00'};slots.push({date:ds(day),startTime:tt.start,endTime:tt.end});}}continue;}
    const nsd=!/\d+\s*[월일]/.test(line)&&!/\b\d{1,2}[-\/]\d{1,2}\b/.test(line)&&!/(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)/i.test(line);
    if(nsd){const wm=line.match(/[월화수목금토일]요일?|(?:mon|tue|wed|thu|fri|sat|sun)(?:day)?/gi);if(wm&&wm.length){let f=false;for(const tok of wm){const key=tok.replace(/요일/,'').trim();const wi=KWD[key]??KWD[key.toLowerCase().slice(0,3)]??KWD[key.toLowerCase()];if(wi!==undefined){for(const day of datesForWeekday(wi,yr,mo)){const tt=t||{start:'09:00',end:'18:00'};slots.push({date:ds(day),startTime:tt.start,endTime:tt.end});}f=true;}}if(f)continue;}}
    const kd=line.match(/(\d{1,2})\s*월\s*(\d{1,2})\s*일/);
    if(kd){const m2=parseInt(kd[1])-1,d=parseInt(kd[2]);if(m2===mo&&d>=1&&d<=dim){const tt=t||{start:'09:00',end:'18:00'};slots.push({date:ds(d),startTime:tt.start,endTime:tt.end});}continue;}
    const e1=lo.match(/\b(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\w*\s+(\d{1,2})\b/),e2=lo.match(/\b(\d{1,2})\s+(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\w*/);
    const em=e1||e2;
    if(em){const mn=e1?e1[1]:e2[2],dn=e1?parseInt(e1[2]):parseInt(e2[1]),moN=(ENMO[mn]||ENMO[mn.slice(0,3)])-1;if(moN===mo&&dn>=1&&dn<=dim){const tt=t||{start:'09:00',end:'18:00'};slots.push({date:ds(dn),startTime:tt.start,endTime:tt.end});}continue;}
    const nd=line.match(/\b(\d{1,2})[\/\-](\d{1,2})\b/);
    if(nd){const a=parseInt(nd[1]),b=parseInt(nd[2]);let m2,d;if(a===mo+1){m2=a-1;d=b;}else if(b===mo+1){m2=b-1;d=a;}else{m2=a-1;d=b;}if(m2===mo&&d>=1&&d<=dim){const tt=t||{start:'09:00',end:'18:00'};slots.push({date:ds(d),startTime:tt.start,endTime:tt.end});}}
  }
  return slots;
}

// ── CONCERT PARSER ──
function parseConcertText(raw){
  const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean);
  let name='',date='',venue='',timetable=[],setlist=[];
  let section='',songNum=0;
  for(const line of lines){
    if(/^[\*★◆]+\s*\S/.test(line)){name=line.replace(/^[\*★◆\s]+/,'').trim();continue;}
    if(/^1\.\s*(일시|날짜)/i.test(line)){section='date';continue;}
    if(/^2\.\s*(장소)/i.test(line)){section='venue';continue;}
    if(/^3\.\s*(타임테이블|시간)/i.test(line)){section='timetable';continue;}
    if(/^4\.\s*(셋리스트|set)/i.test(line)){section='setlist';continue;}
    if(section==='date'){const m=line.match(/(\d{1,2})[\/월]\s*(\d{1,2})/);if(m){const mo=parseInt(m[1]),d=parseInt(m[2]);date=`${now.getFullYear()}-${pad(mo)}-${pad(d)}`;}}
    if(section==='venue'){const v=line.replace(/^[-\s]+/,'').trim();if(v&&!venue)venue=v;}
    if(section==='timetable'){const m=line.match(/(\d{1,2}:\d{2})(?:\s*[-~]\s*(\d{1,2}:\d{2}))?\s*[ㅣ|]\s*(.+)/);if(m)timetable.push({time:m[1],endTime:m[2]||null,label:m[3].trim()});}
    if(section==='setlist'){
      const numbered=line.match(/^(\d+)[)\.]\s*(.+)/);
      if(numbered){songNum++;setlist.push({type:'song',num:songNum,title:numbered[2].trim()});}
      else if(!/^\d+\./.test(line)){const clean=line.replace(/^[-\s]+/,'').trim();if(clean)setlist.push({type:'annotation',text:clean});}
    }
  }
  if(!name&&lines.length)name=lines[0].replace(/^[\*★◆\s]+/,'').trim();
  return{name,date,venue,timetable,setlist};
}

// ── JSONBIN ──
async function fetchData(){const r=await fetch(`https://api.jsonbin.io/v3/b/${CFG_BIN}/latest`,{headers:{'X-Master-Key':CFG_KEY,'X-Bin-Meta':'false'}});if(!r.ok)throw new Error(`fetch ${r.status}`);return await r.json();}
async function pushData(data){const r=await fetch(`https://api.jsonbin.io/v3/b/${CFG_BIN}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':CFG_KEY},body:JSON.stringify(data)});if(!r.ok)throw new Error(`push ${r.status}`);}
function setSyncBar(msg,cls){const el=document.getElementById('sync-bar');el.className='sync-bar '+cls;el.textContent=msg;}

// ── STATE ──
function getWeekStart(base){const d=new Date(base);const day=d.getDay();const diff=day===0?-6:1-day;d.setDate(d.getDate()+diff);d.setHours(0,0,0,0);return d;}
let weekStart=getWeekStart(now);
let G={act:0,tm:NAMES.map(n=>({name:n,slots:[],ok:false,warn:''})),concerts:[]};
let saveTimeout=null,pendingConcert=null;

async function bootApp(){
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('app').style.display='block';
  setSyncBar('데이터 불러오는 중…','sync-ing');
  try{
    const data=await fetchData();
    if(data&&data.tm){
      G.tm=NAMES.map((name,i)=>({name:data.tm[i]?.name||name,slots:data.tm[i]?.slots||[],ok:!!(data.tm[i]?.slots?.length),warn:''}));
      G.concerts=data.concerts||[];
    }
    setSyncBar('✓ 동기화 완료','sync-ok');
  }catch(e){setSyncBar('⚠ 오프라인 모드','sync-err');}
  renderAll();
  setInterval(async()=>{
    try{
      const data=await fetchData();
      if(data&&data.tm){
        G.tm=NAMES.map((name,i)=>({name:data.tm[i]?.name||G.tm[i].name,slots:data.tm[i]?.slots||[],ok:!!(data.tm[i]?.slots?.length),warn:G.tm[i].warn}));
        G.concerts=data.concerts||[];
        renderAll();setSyncBar('✓ 동기화 완료','sync-ok');
      }
    }catch(e){}
  },30000);
}

async function debounceSave(){
  clearTimeout(saveTimeout);
  saveTimeout=setTimeout(async()=>{
    setSyncBar('저장 중…','sync-ing');
    try{await pushData({tm:G.tm.map(t=>({name:t.name,slots:t.slots,ok:t.ok})),concerts:G.concerts});setSyncBar('✓ 저장 완료','sync-ok');}
    catch(e){setSyncBar('⚠ 저장 실패','sync-err');}
  },800);
}

// ── SCHEDULE ACTIONS ──
function submitSched(){
  const i=G.act,ne=document.getElementById('ni'),pe=document.getElementById('pi');
  const nm=(ne?.value||'').trim()||G.tm[i].name,pr=(pe?.value||'').trim();
  if(!pr){G.tm[i].warn='내용을 입력해주세요.';renderSb();return;}
  const mid=new Date(weekStart);mid.setDate(mid.getDate()+3);
  const yr=mid.getFullYear(),mo=mid.getMonth();
  const newSlots=parseSchedule(pr,yr,mo);
  if(!newSlots.length){G.tm[i].warn='인식된 일정이 없어요.';renderSb();return;}
  const existing=G.tm[i].slots||[],existingKeys=new Set(existing.map(slotsKey));
  G.tm[i]={...G.tm[i],name:nm,slots:[...existing,...newSlots.filter(s=>!existingKeys.has(slotsKey(s)))],ok:true,warn:''};
  if(pe)pe.value='';debounceSave();renderAll();
}
function deleteSlot(tmIdx,key){G.tm[tmIdx].slots=G.tm[tmIdx].slots.filter(s=>slotsKey(s)!==key);G.tm[tmIdx].ok=G.tm[tmIdx].slots.length>0;debounceSave();renderAll();}

function renderWeek(){
  const dates=weekDates();
  const d0=dates[0],d6=dates[6];
  const sm=d0.getMonth()===d6.getMonth();
  document.getElementById('wtitle').textContent=sm
    ?`${d0.getFullYear()}년 ${d0.getMonth()+1}월 ${d0.getDate()}일 – ${d6.getDate()}일`
    :`${d0.getMonth()+1}/${d0.getDate()} – ${d6.getMonth()+1}/${d6.getDate()}`;
  const sub=G.tm.filter(t=>t.ok);
  const FIRST=SLOTS[0],LAST=SLOTS[SLOTS.length-1];
  let html='';
  // Header
  html+=`<div class="wgh-corner"></div>`;
  for(const d of dates){
    const isT=dateStr(d)===dateStr(now),ds=dateStr(d);
    const cIdx=G.concerts.findIndex(c=>normDate(c.date)===ds);
    const ctag=cIdx>=0?`<span class="wgh-ctag" onclick="openConcertDetail(${cIdx})">${esc(G.concerts[cIdx].name)}</span>`:'';
    html+=`<div class="wgh"><div class="wgh-day">${KD[d.getDay()]}</div><div class="wgh-date${isT?' tod':''}">${d.getDate()}</div>${ctag}</div>`;
  }
  // Slots
  for(const sl of SLOTS){
    const[hh,mm]=sl.split(':').map(Number),isHour=mm===0,isLast=sl===LAST;
    const label=isHour?`${hh}시`:(isLast?'↑24':'');
    html+=`<div class="tl${isHour?' hr':''}" style="${isLast?'font-size:8px':''}">${label}</div>`;
    for(const d of dates){
      const ds=dateStr(d);
      const busyList=sub.filter(t=>isBz(t.slots,ds,sl));
      const allFree=sub.length>0&&busyList.length===0;
      const cIdx=G.concerts.findIndex(c=>normDate(c.date)===ds);
      const concert=cIdx>=0?G.concerts[cIdx]:null;
      const ttEv=concert?ttEventAt(concert,sl):null;
      const ttCls=ttEv?ttColor(ttEv.label).cls:'';
      // Is this the first slot of the timetable event?
      const isTtStart=ttEv&&toMin(ttEv.time)===toMin(sl);
      // Concert column border
      let cCls='';
      if(concert){cCls=' c-col';if(sl===FIRST)cCls+=' c-top';if(sl===LAST)cCls+=' c-bot';}
      const cls=`slot${isHour?' hr-top':''}${allFree&&!ttEv?' free-all':''}${ttCls?' '+ttCls:''}${cCls}`;
      let inner='';
      if(busyList.length>0&&!ttEv){const w=Math.floor(100/busyList.length);inner=busyList.map((t,idx)=>{const j=G.tm.indexOf(t);return`<div class="sbar" style="background:${CLR[j].bg};left:${idx*w}%;width:${idx===busyList.length-1?100-idx*w:w}%"></div>`;}).join('');}
      if(isTtStart){const col=ttColor(ttEv.label);inner+=`<span class="tt-lbl" style="color:${col.text}">${esc(ttEv.label)}</span>`;}
      html+=`<div class="${cls}">${inner}</div>`;
    }
  }
  document.getElementById('wgrid').innerHTML=html;
  const wrap=document.querySelector('.wgrid-wrap');
  if(wrap&&wrap.dataset.scrolled!=='1'){wrap.scrollTop=72;wrap.dataset.scrolled='1';}
}

function renderLgnd(){
  const sub=G.tm.filter(t=>t.ok);
  const wDates=weekDates().map(dateStr);
  const hasConcert=G.concerts.some(c=>wDates.includes(normDate(c.date)));
  let html=sub.length
    ?sub.map(t=>{const j=G.tm.indexOf(t);return`<div class="lgi"><div class="lgdot" style="background:${CLR[j].bg}"></div>${esc(t.name)}</div>`;}).join('')+`<div class="lgi"><div class="lgfree"></div>전원 가능</div>`
    :`<span style="color:#94a3b8;font-size:11px">일정 추가 시 표시</span>`;
  if(hasConcert)html+=`<div class="lgi"><div class="lgconcert"></div>공연일</div>`;
  document.getElementById('lgnd').innerHTML=html;
}

function switchTab(j){const ne=document.getElementById('ni');if(ne)G.tm[G.act].name=ne.value;G.act=j;renderSb();}
document.getElementById('pbtn').onclick=()=>{weekStart=new Date(weekStart);weekStart.setDate(weekStart.getDate()-7);const w=document.querySelector('.wgrid-wrap');if(w)w.dataset.scrolled='';renderWeek();renderLgnd();};
document.getElementById('xbtn').onclick=()=>{weekStart=new Date(weekStart);weekStart.setDate(weekStart.getDate()+7);const w=document.querySelector('.wgrid-wrap');if(w)w.dataset.scrolled='';renderWeek();renderLgnd();};
loadConfig();
</script>
</body>
